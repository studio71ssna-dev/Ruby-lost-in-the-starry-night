name: 🎮 Build & Deploy Unity (RubyStarryNight)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ITCH_GAME: ruby-lost-in-the-starry-night
  ITCH_USER: studio-71

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform: WebGL
            itchChannel: html
          - targetPlatform: StandaloneWindows64
            itchChannel: windows
          - targetPlatform: Android
            itchChannel: android

    steps:
      # 1️⃣ Checkout
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # 2️⃣ Cache
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ github.ref }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      # 3️⃣ Free Disk Space (important for Android + WebGL)
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: false

      # 4️⃣ Build Unity
      - name: Build Unity Game
        timeout-minutes: 90
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: RubyStarryNight

      # 5️⃣ Fix Permissions (CRITICAL)
      - name: Fix Permissions
        run: sudo chown -R $USER:$USER build

      # 🪟 Windows Zip
      - name: Zip Build (Windows)
        if: matrix.targetPlatform == 'StandaloneWindows64'
        run: |
          cd build/StandaloneWindows64
          zip -r StandaloneWindows64.zip .
          mv StandaloneWindows64.zip ../

      # 🌐 WebGL Zip (IMPORTANT)
      - name: Zip Build (WebGL)
        if: matrix.targetPlatform == 'WebGL'
        run: |
          cd build/WebGL
          zip -r WebGL.zip *
          mv WebGL.zip ../

      # 🤖 Android Zip (APK/AAB)
      - name: Zip Build (Android)
        if: matrix.targetPlatform == 'Android'
        run: |
          cd build/Android
          zip -r Android.zip .
          mv Android.zip ../

      # 6️⃣ Upload Artifact (backup)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: build/${{ matrix.targetPlatform }}.zip

      # 7️⃣ Upload to itch (latest)
      - name: Push to itch.io (latest)
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: ${{ matrix.itchChannel }}
          ITCH_GAME: ${{ env.ITCH_GAME }}
          ITCH_USER: ${{ env.ITCH_USER }}
          PACKAGE: build/${{ matrix.targetPlatform }}.zip

      # 8️⃣ Upload to itch (versioned)
      - name: Push to itch.io (versioned)
        uses: manleydev/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: ${{ matrix.itchChannel }}-${{ github.run_number }}
          ITCH_GAME: ${{ env.ITCH_GAME }}
          ITCH_USER: ${{ env.ITCH_USER }}
          PACKAGE: build/${{ matrix.targetPlatform }}.zip