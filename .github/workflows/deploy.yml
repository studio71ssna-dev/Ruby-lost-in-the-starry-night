name: Build and Deploy Unity to itch.io

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Push (${{ matrix.targetPlatform }})
    runs-on: ubuntu-latest
    
    # Run all 3 builds simultaneously
    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform: WebGL
            itchChannel: html
          - targetPlatform: StandaloneWindows64
            itchChannel: windows
          - targetPlatform: Android
            itchChannel: android

    steps:
      # 1. Pull your code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true 

      # 2. Free up disk space (with Docker fix applied)
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: false # Prevents deleting the Butler container!

      # 3. Build the Game
      - name: Build Unity Game
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: RubyLostInTheStarryNight

      # 4. Upload to Itch.io
      - name: Push to itch.io
        uses: manleydev/butler-publish-itchio-action@master # Uses updated master branch
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: ${{ matrix.itchChannel }}
          ITCH_GAME: ruby-lost-in-the-starry-night
          ITCH_USER: studio-71
          PACKAGE: build/${{ matrix.targetPlatform }}